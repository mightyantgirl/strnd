<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strnd</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="src/styles/main.css" />
  </head>
  <body>
    <div class="home-wrap">
      <!-- 헤더 -->
      <header class="header">
        <div class="header-body"></div>
      </header>

      <!-- 본문 -->
      <main class="home-content">
        <div class="container">
          <div class="row">
            <div class="col-sm-4">
              <div class="survey-question">
                <!-- 인사 텍스트 -->
                <div class="home-greeting">
                  <p class="home-greeting-line">
                    안녕하세요,
                    <span class="u-brand">희진</span>
                    님!
                  </p>
                  <p class="home-greeting-line">
                    <span class="u-brand">42일</span>
                    만에 방문해주셨네요
                  </p>
                </div>

                <!-- 서브텍스트 -->
                <p class="home-history">
                  마지막으로 받은 시술은
                  <u>프리미엄 크리닉,</u>
                  <br />
                  아트룸 헤어에 총
                  <u>12번</u>
                  방문해주셨어요!
                </p>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- 하단 CTA -->
      <footer class="cta">
        <button class="btn-primary" type="button">작성하기</button>
      </footer>
    </div>
  </body>
</html>
