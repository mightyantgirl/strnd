<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strnd — Step 4</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="src/styles/main.css" />
  </head>
  <body>
    <div class="survey-wrap">
      <!-- 헤더 (뒤로가기 + 프로그래스) -->
      <header class="header">
        <div class="header-nav">
          <div class="header-nav-left">
            <button class="header-back" type="button" aria-label="뒤로가기">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 19L8 12L15 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
          </div>
        </div>

        <div class="header-progress">
          <div class="header-progress-track">
            <div class="header-progress-fill" style="--progress: 70%"></div>
          </div>
        </div>
      </header>

      <!-- 본문 -->
      <main class="survey-content survey-content--snackbar">
        <div class="container">
          <div class="row">
            <div class="col-sm-4">
              <div class="survey-question">
                <p class="survey-question-label">Step 4</p>
                <h1 class="survey-question-title">
                  현재 헤어스타일에서
                  <br />
                  신경쓰이는 부분이 있나요?
                </h1>
              </div>

              <!-- 칩 버튼 그룹 (다중 선택) -->
              <ol class="survey-chip-list">
                <li class="survey-chip-list-item"><button class="btn-chip" type="button">➰ 자주 엉켜요</button></li>
                <li class="survey-chip-list-item"><button class="btn-chip" type="button">✂️ 커트 라인이 마음에 안들어요</button></li>
                <li class="survey-chip-list-item"><button class="btn-chip" type="button">⚡️ 건조해요</button></li>
                <li class="survey-chip-list-item"><button class="btn-chip" type="button">🎨️ 색이 마음에 안들어요</button></li>
                <li class="survey-chip-list-item"><button class="btn-chip" type="button">💊 영양이 부족해요</button></li>
                <li class="survey-chip-list-item"><button class="btn-chip is-active" type="button">💆‍♀️ 두피 케어가 필요해요</button></li>
              </ol>
            </div>
          </div>
        </div>
      </main>

      <!-- 하단 CTA -->
      <footer class="cta">
        <!-- 스낵바 (미선택 시 안내) -->
        <div class="cta-snackbar">
          <div class="snackbar">
            <svg class="snackbar-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="10" cy="10" r="9" stroke="white" stroke-width="1.5" />
              <path d="M10 5.5V11" stroke="white" stroke-width="1.5" stroke-linecap="round" />
              <circle cx="10" cy="14" r="0.75" fill="white" />
            </svg>
            <span class="snackbar-message">하나 이상의 항목을 선택해주세요.</span>
          </div>
        </div>
        <button class="btn-primary" type="button">다음</button>
      </footer>
    </div>
  </body>
</html>
