<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strnd — Step 2</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="src/styles/main.css" />
  </head>
  <body>
    <div class="survey-wrap">
      <!-- 헤더 (뒤로가기 + 프로그래스) -->
      <header class="header">
        <div class="header-nav">
          <div class="header-nav-left">
            <button class="header-back" type="button" aria-label="뒤로가기">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 19L8 12L15 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
          </div>
        </div>

        <div class="header-progress">
          <div class="header-progress-track">
            <div class="header-progress-fill" style="--progress: 50%"></div>
          </div>
        </div>
      </header>

      <!-- 본문 -->
      <main class="survey-content">
        <div class="container">
          <div class="row">
            <div class="col-sm-4">
              <div class="survey-question">
                <p class="survey-question-label">Step 2</p>
                <h1 class="survey-question-title">
                  원하는 이미지의
                  <br />
                  스타일이 있나요?
                </h1>
              </div>

              <!-- 2×3 스타일 카드 그리드 -->
              <ol class="survey-grid">
                <li class="survey-grid-item">
                  <button class="hair-card" type="button">
                    <img class="hair-card-image" src="img/hair_01.png" alt="C컬 레이어드" />
                    <div class="hair-card-overlay"></div>
                    <span class="hair-card-label">C컬 레이어드</span>
                  </button>
                </li>
                <li class="survey-grid-item">
                  <button class="hair-card is-active" type="button">
                    <img class="hair-card-image" src="img/hair_02.png" alt="S컬 레이어드" />
                    <div class="hair-card-overlay"></div>
                    <span class="hair-card-label">S컬 레이어드</span>
                  </button>
                </li>
                <li class="survey-grid-item">
                  <button class="hair-card" type="button">
                    <img class="hair-card-image" src="img/hair_03.png" alt="원랭스 컷" />
                    <div class="hair-card-overlay"></div>
                    <span class="hair-card-label">원랭스 컷</span>
                  </button>
                </li>
                <li class="survey-grid-item">
                  <button class="hair-card" type="button">
                    <img class="hair-card-image" src="img/hair_04.png" alt="숏컷" />
                    <div class="hair-card-overlay"></div>
                    <span class="hair-card-label">숏컷</span>
                  </button>
                </li>
                <li class="survey-grid-item">
                  <button class="hair-card is-active" type="button">
                    <img class="hair-card-image" src="img/hair_05.png" alt="C컬 레이어드" />
                    <div class="hair-card-overlay"></div>
                    <span class="hair-card-label">C컬 레이어드</span>
                  </button>
                </li>
                <li class="survey-grid-item">
                  <button class="hair-card" type="button">
                    <img class="hair-card-image" src="img/hair_06.png" alt="C컬 레이어드" />
                    <div class="hair-card-overlay"></div>
                    <span class="hair-card-label">C컬 레이어드</span>
                  </button>
                </li>
                <li class="survey-grid-item">
                  <button class="hair-card" type="button">
                    <img class="hair-card-image" src="img/hair_06.png" alt="C컬 레이어드" />
                    <div class="hair-card-overlay"></div>
                    <span class="hair-card-label">C컬 레이어드</span>
                  </button>
                </li>
                <li class="survey-grid-item">
                  <button class="hair-card" type="button">
                    <img class="hair-card-image" src="img/hair_06.png" alt="C컬 레이어드" />
                    <div class="hair-card-overlay"></div>
                    <span class="hair-card-label">C컬 레이어드</span>
                  </button>
                </li>
                <li class="survey-grid-item">
                  <button class="hair-card" type="button">
                    <img class="hair-card-image" src="img/hair_06.png" alt="C컬 레이어드" />
                    <div class="hair-card-overlay"></div>
                    <span class="hair-card-label">C컬 레이어드</span>
                  </button>
                </li>
              </ol>
            </div>
          </div>
        </div>
      </main>

      <!-- 하단 CTA -->
      <div class="cta-wrap">
        <footer class="cta">
          <button class="btn-primary" type="button">다음</button>
        </footer>
      </div>
    </div>
  </body>
</html>
