<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strnd — Step 2</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="src/styles/main.css" />
  </head>
  <body>
    <div class="step">
      <!-- 헤더 (GNB + 서베이 헤더) -->
      <header class="site-header">
        <!-- GNB + 뒤로가기 -->
        <div class="gnb">
          <div class="gnb-left">
            <button class="back" type="button" aria-label="뒤로가기">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 19L8 12L15 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
          </div>
        </div>

        <!-- 서베이 헤더 (프로그래스) -->
        <div class="lnb">
          <div class="lnb-progress">
            <div class="lnb-fill" style="--progress: 66.66%"></div>
          </div>
        </div>
      </header>

      <!-- 본문 -->
      <main class="step-content">
        <div class="container">
          <div class="row">
            <div class="col-sm-4">
              <div class="step-header">
                <p class="step-label">Step 2</p>
                <h1 class="step-heading">
                  원하는 이미지의
                  <br />
                  스타일이 있나요?
                </h1>
              </div>

              <!-- 2×3 스타일 카드 그리드 -->
              <ol class="step-grid">
                <li>
                  <button class="style-card" type="button">
                    <img class="style-card-image" src="img/hair_01.png" alt="C컬 레이어드" />
                    <div class="style-card-overlay"></div>
                    <span class="style-card-label">C컬 레이어드</span>
                  </button>
                </li>
                <li>
                  <button class="style-card is-active" type="button">
                    <img class="style-card-image" src="img/hair_02.png" alt="S컬 레이어드" />
                    <div class="style-card-overlay"></div>
                    <span class="style-card-label">S컬 레이어드</span>
                  </button>
                </li>
                <li>
                  <button class="style-card" type="button">
                    <img class="style-card-image" src="img/hair_03.png" alt="원랭스 컷" />
                    <div class="style-card-overlay"></div>
                    <span class="style-card-label">원랭스 컷</span>
                  </button>
                </li>
                <li>
                  <button class="style-card" type="button">
                    <img class="style-card-image" src="img/hair_04.png" alt="숏컷" />
                    <div class="style-card-overlay"></div>
                    <span class="style-card-label">숏컷</span>
                  </button>
                </li>
                <li>
                  <button class="style-card is-active" type="button">
                    <img class="style-card-image" src="img/hair_05.png" alt="C컬 레이어드" />
                    <div class="style-card-overlay"></div>
                    <span class="style-card-label">C컬 레이어드</span>
                  </button>
                </li>
                <li>
                  <button class="style-card" type="button">
                    <img class="style-card-image" src="img/hair_06.png" alt="C컬 레이어드" />
                    <div class="style-card-overlay"></div>
                    <span class="style-card-label">C컬 레이어드</span>
                  </button>
                </li>
                <li>
                  <button class="style-card" type="button">
                    <img class="style-card-image" src="img/hair_06.png" alt="C컬 레이어드" />
                    <div class="style-card-overlay"></div>
                    <span class="style-card-label">C컬 레이어드</span>
                  </button>
                </li>
                <li>
                  <button class="style-card" type="button">
                    <img class="style-card-image" src="img/hair_06.png" alt="C컬 레이어드" />
                    <div class="style-card-overlay"></div>
                    <span class="style-card-label">C컬 레이어드</span>
                  </button>
                </li>
                <li>
                  <button class="style-card" type="button">
                    <img class="style-card-image" src="img/hair_06.png" alt="C컬 레이어드" />
                    <div class="style-card-overlay"></div>
                    <span class="style-card-label">C컬 레이어드</span>
                  </button>
                </li>
              </ol>
            </div>
          </div>
        </div>
      </main>

      <!-- 하단 CTA -->
      <div class="step-footer">
        <footer class="step-cta">
          <button class="btn-primary" type="button">다음</button>
        </footer>
      </div>
    </div>
  </body>
</html>
