<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strnd — 로그인</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="src/styles/main.css" />
  </head>
  <body>
    <div class="survey-wrap">
      <!-- 헤더 (상태바 영역만) -->
      <header class="header">
        <div class="header-body"></div>
      </header>

      <!-- 본문 -->
      <main class="survey-content login-content">
        <!-- 히어로 영역 (태그라인 + 로고) -->
        <div class="container login-hero">
          <div class="row">
            <div class="col-sm-4">
              <p class="login-tagline">
                한 올 한 올,
                <br />
                당신의 결을 기록합니다.
              </p>
              <h1 class="login-logo">
                strnd
                <span>.</span>
              </h1>
            </div>
          </div>
        </div>

        <!-- 입력 영역 -->
        <div class="container">
          <div class="row">
            <div class="col-sm-4">
              <p class="login-label">성함을 기입해주세요 :)</p>
              <div class="textfield">
                <input class="textfield-input" type="text" placeholder="이름" />
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- 하단 CTA -->
      <footer class="cta">
        <button class="btn-primary" type="button" disabled>시작하기</button>
      </footer>
    </div>
  </body>
</html>
